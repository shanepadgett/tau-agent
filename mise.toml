[tools]
node = "22.19.0"
"npm:@biomejs/biome" = "2.3.5"
"npm:markdownlint-cli2" = "0.22.1"

[settings]
jobs = 1
task_output = "quiet"

[tasks.check]
description = "Run Biome, TypeScript, and Markdown checks"
depends = ["check:biome", "check:types", "check:markdown"]

[tasks."check:biome"]
description = "Run Biome checks"
run = "biome check --write --error-on-warnings --no-errors-on-unmatched src"

[tasks."check:markdown"]
description = "Run Markdown checks"
run = "markdownlint-cli2 --fix"

[tasks."check:types"]
description = "Run TypeScript checks"
run = "if find src -name '*.ts' -print -quit | grep -q .; then ./node_modules/.bin/tsgo --noEmit; else echo 'No TypeScript files to check'; fi"
