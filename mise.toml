[tools]
node = "22.19.0"
"npm:oxfmt" = "0.57.0"
"npm:oxlint" = "1.72.0"
"npm:markdownlint-cli2" = "0.22.1"
"npm:fallow" = "2.100.0"

[settings]
jobs = 1
task_output = "quiet"

[tasks."check:ts"]
description = "TS and config checks"
depends = ["check:schema", "check:style", "check:types", "test:unit", "check:deadcode"]

[tasks."check:md"]
description = "Markdown checks"
depends = ["check:markdown"]

[tasks.generate-schema]
description = "Generate Tau settings schema"
run = "node --experimental-strip-types scripts/generate-tau-schema.ts --write"

[tasks."check:schema"]
description = "Check Tau settings schema drift"
run = "node --experimental-strip-types scripts/generate-tau-schema.ts --check"

[tasks."check:style"]
description = "Run Oxfmt and Oxlint fixes"
run = "oxfmt --write 'src/**/*.ts' '.pi/extensions/**/*.ts' 'test/**/*.ts' 'scripts/**/*.ts' && oxlint --fix --format=agent src .pi/extensions test scripts"

[tasks."check:markdown"]
description = "Run Markdown checks"
run = "markdownlint-cli2 --fix"

[tasks."check:types"]
description = "Run TypeScript checks"
run = "./node_modules/.bin/tsgo --noEmit"

[tasks."test:unit"]
description = "Run unit tests"
run = "npm run test:unit"

[tasks."check:deadcode"]
description = "Run Fallow dead-code and duplication checks"
run = "fallow --only dead-code,dupes --fail-on-issues"
