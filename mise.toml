[tools]
node = "24.18.0"
python = "3.13"
rust = "1.88.0"
"npm:oxfmt" = "0.57.0"
"npm:oxlint" = "1.72.0"
"npm:markdownlint-cli2" = "0.22.1"
"npm:fallow" = "2.100.0"

[settings]
jobs = 1
task_output = "quiet"

[tasks.check]
description = "Run all checks"
depends = ["check:ts", "check:rust", "check:md"]

[tasks."check:ts"]
description = "TS and config checks"
depends = ["check:dependencies", "check:schema", "check:style", "check:types", "test:unit", "check:deadcode"]

[tasks."check:dependencies"]
description = "Check installed dependency tree"
run = '''
if ! npm ls --depth=0 --loglevel=silent >/dev/null 2>&1; then
  echo "Dependency installation is stale or incomplete. Run: npm ci --ignore-scripts" >&2
  exit 1
fi
'''

[tasks."check:md"]
description = "Markdown checks"
depends = ["check:markdown"]

[tasks."check:rust"]
description = "Rust checks"
depends = ["check:rust-format", "check:rust-clippy", "test:rust"]

[tasks."check:rust-format"]
description = "Check Rust formatting"
run = "cargo fmt --manifest-path packages/agent/native/tau-ast/Cargo.toml --all -- --check"

[tasks."check:rust-clippy"]
description = "Run Rust Clippy"
run = "cargo clippy --manifest-path packages/agent/native/tau-ast/Cargo.toml --all-targets --all-features -- -D warnings"

[tasks."test:rust"]
description = "Run Rust tests"
run = "cargo test --manifest-path packages/agent/native/tau-ast/Cargo.toml --all-targets --all-features"

[tasks."benchmark:ast"]
description = "Benchmark cold and warm tau-ast outlines"
run = '''
cargo build --release --manifest-path packages/agent/native/tau-ast/Cargo.toml
python packages/agent/native/tau-ast/scripts/benchmark.py \
  packages/agent/extensions/explore/index.ts \
  packages/agent/native/tau-ast/fixtures/odin.odin
'''

[tasks.generate-schema]
description = "Generate Tau settings schema"
run = "node --experimental-strip-types packages/agent/scripts/generate-tau-schema.ts --write"

[tasks."check:schema"]
description = "Check Tau settings schema drift"
run = "node --experimental-strip-types packages/agent/scripts/generate-tau-schema.ts --check"

[tasks."check:style"]
description = "Run Oxfmt and Oxlint fixes"
run = "oxfmt --write 'packages/**/*.ts' '.pi/extensions/**/*.ts' && oxlint --fix --format=agent packages .pi/extensions"

[tasks."check:markdown"]
description = "Run Markdown checks"
run = "markdownlint-cli2 --fix"

[tasks."check:types"]
description = "Run TypeScript checks"
run = "./node_modules/.bin/tsgo --noEmit"

[tasks."test:unit"]
description = "Run unit tests"
run = "./node_modules/.bin/vitest --run --reporter=agent"

[tasks."check:deadcode"]
description = "Run Fallow dead-code and duplication checks"
run = "fallow --only dead-code,dupes --fail-on-issues"
