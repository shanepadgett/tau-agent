name: Publish packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --global npm@10.9.3
      - run: npm run check:package-sources
      - run: npm ci --ignore-scripts
      - run: npm pack --dry-run --workspace @shanepadgett/tau-tui
      - run: npm pack --dry-run --workspace @shanepadgett/tau-agent
      - run: npm publish --workspace @shanepadgett/tau-tui --access public
      - run: npm publish --workspace @shanepadgett/tau-agent --access public
