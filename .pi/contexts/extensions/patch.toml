name = "Patch"
description = "Complete and bounded context for the patch extension"

[all]
description = "Every extension file, direct shared dependency, test, and user-facing help"
files = [
  "packages/agent/extensions/patch/README.md",
  "packages/agent/extensions/patch/executor.ts",
  "packages/agent/extensions/patch/index.ts",
  "packages/agent/extensions/patch/matcher.ts",
  "packages/agent/extensions/patch/parser.ts",
  "packages/agent/extensions/patch/render.ts",
  "packages/agent/extensions/patch/summary.ts",
]
anchors = [
  "packages/agent/shared/events.ts",
  "packages/agent/shared/ranges.ts",
  "packages/agent/shared/tool-row-state.ts",
  "packages/agent/test/extensions/patch/scenarios.test.ts",
  "packages/agent/test/extensions/patch/fixtures/scenarios/README.md",
]
[runtime]
description = "Extension runtime and direct shared dependencies"
