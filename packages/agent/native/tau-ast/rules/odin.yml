id: odin-import
language: Odin
role: item
symbolType: module
rule:
  kind: import_declaration
name: import
isImport: true
isExported: false
---
id: odin-procedure
language: Odin
role: item
symbolType: function
rule:
  kind: procedure_declaration
  has:
    stopBy: neighbor
    kind: identifier
    pattern: $NAME
name: $NAME
isExported:
  not:
    has:
      stopBy: neighbor
      kind: attributes
      regex: private
