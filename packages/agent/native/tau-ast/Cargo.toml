[package]
name = "tau-ast"
version = "0.1.0"
edition = "2024"
rust-version = "1.88.0"
license = "MIT"
publish = false

[dependencies]
ast-grep-config = "=0.45.0"
ast-grep-core = { version = "=0.45.0", default-features = false, features = ["tree-sitter"] }
ast-grep-language = { version = "=0.45.0", default-features = false, features = [
    "tree-sitter-c-sharp",
    "tree-sitter-go",
    "tree-sitter-java",
    "tree-sitter-kotlin",
    "tree-sitter-rust",
    "tree-sitter-swift",
    "tree-sitter-typescript",
] }
ast-grep-outline = "=0.45.0"
base64 = "0.22.1"
blake3 = "1.8.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tree-sitter-odin = "=1.3.0"

[profile.release]
lto = "thin"
strip = true
